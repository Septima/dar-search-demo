<!doctype html>
<html lang="da">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Eksempel på brug af DAR search UI</title>
    <style>
      body {
        font-family: sans-serif;
        line-height: 1.5;
        margin: 1rem;
        padding: 0;
        color: black;
        background-color: white;
        gap: 2rem;
      }
      h1,
      h2 {
        color: black;
      }
      h2 {
        margin: 2rem 0 0;
        font-size: 1.3rem;
      }
    </style>
    <link rel="stylesheet" href="./dawa-autocomplete.css" />
    <script src="./dawa-autocomplete.iife.js"></script>
  </head>
  <body>
    <h1>Adressevælger demo</h1>

    <article>
      <h2>CDN version</h2>

      <!-- HTML -->
      <div class="dawa-autocomplete-container">
        <input type="search" id="demoCDN" />
      </div>

      <!-- Javascript -->
      <script>
        dawaAutocomplete.dawaAutocomplete(document.getElementById("demoCDN"), {
          token: "demo-3KCVX33CKZ",
          select: function (selected) {
            console.log("Selected address:", selected);
          },
        });
      </script>
    </article>

    <article>
      <h2>ES module version</h2>

      <!-- HTML -->
      <div class="dawa-autocomplete-container">
        <input type="search" id="demoES" />
      </div>

      <!-- Javascript using -->
      <script type="module">
        import dawaAutocomplete2 from "./dawa-autocomplete.esm.js";
        var inputElm = document.getElementById("demoES");
        var component = dawaAutocomplete2.dawaAutocomplete(inputElm, {
          token: "demo-3KCVX33CKZ",
          select: function (selected) {
            console.log("Valgt adresse: ", selected);
          },
        });
      </script>
    </article>

    <article>
      <h2>adgangsadresserOnly: true</h2>
      <div class="dawa-autocomplete-container">
        <input type="search" id="demo3" />
      </div>
      <script type="module">
        import dawaAutocomplete2 from "./dawa-autocomplete.esm.js";
        var inputElm = document.getElementById("demo3");
        var component = dawaAutocomplete2.dawaAutocomplete(inputElm, {
          token: "demo-3KCVX33CKZ",
          adgangsadresserOnly: true,
          select: function (selected) {
            console.log("Valgt adresse: ", selected);
          },
        });
      </script>
    </article>

    <article>
      <h2>kommuneKode: 0580</h2>

        });
      </script>

    <article>

    <article>
      <h2>medtagForeloebige: true</h2>

        <input type="search" id="demo6" />

    </article>

    <article>
      <h2>vejnavn/postnummer</h2>
      <div class="dawa-autocomplete-container">
        <input type="search" id="demo7" />
      </div>
      <script type="module">
        import dawaAutocomplete2 from "./dawa-autocomplete.esm.js";

    </article>
  </body>
</html>
